<div class="dashboard-container">
  <aside>
    <div class="form-card">
      <h2 style="margin-top: 0; margin-bottom: 20px;">Nuovo Evento</h2>
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <div><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Titolo</label>
        <input [(ngModel)]="nuovoEvento.titolo"></div>
        <div><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Descrizione</label>
        <textarea [(ngModel)]="nuovoEvento.descrizione" rows="4"></textarea></div>
        <div><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Data e Ora</label>
        <input type="datetime-local" [(ngModel)]="nuovoEvento.data"></div>
        <div><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Luogo</label>
        <input [(ngModel)]="nuovoEvento.luogo"></div>
        <div style="display:flex; gap:10px;">
          <div style="flex:1"><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Prezzo</label><input type="number" [(ngModel)]="nuovoEvento.prezzo"></div>
          <div style="flex:1"><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Posti</label><input type="number" [(ngModel)]="nuovoEvento.posti"></div>
        </div>
        <div><label style="font-size:0.7rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Locandina</label>
        <input type="file" (change)="onFileSelected($event)"></div>
        <button (click)="salva()" style="background: #10b981; padding: 15px; margin-top: 10px;">🚀 Pubblica Ora</button>
      </div>
    </div>
  </aside>

  <section>
    <h2 style="margin-top: 0; margin-bottom: 20px;">I tuoi Eventi</h2>
    <div style="display: flex; flex-direction: column; gap: 15px;">
      @for (e of mieiEventi(); track e.id) {
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
              <h3 style="margin: 0; font-size: 1.1rem;">{{ e.titolo }}</h3>
              <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: var(--text-light);">📍 {{ e.luogo }}</p>
            </div>
            <button (click)="elimina(e.id)" class="btn-danger">Elimina</button>
          </div>

          <div style="display: flex; gap: 10px;">
            <div style="flex:1; background: #f8fafc; padding: 10px; border-radius: 8px; text-align: center;">
              <div style="font-size: 0.6rem; font-weight: 800; color: #94a3b8;">ISCRITTI</div>
              <div style="font-weight: 800;">{{ e.num_iscritti }}</div>
            </div>
            <div style="flex:1; background: #f8fafc; padding: 10px; border-radius: 8px; text-align: center;">
              <div style="font-size: 0.6rem; font-weight: 800; color: #94a3b8;">INCASSI</div>
              <div style="font-weight: 800; color: #10b981;">{{ e.incasso_stimato }}€</div>
            </div>
            <div style="flex:1; background: #f8fafc; padding: 10px; border-radius: 8px; text-align: center;">
              <div style="font-size: 0.6rem; font-weight: 800; color: #94a3b8;">RATING</div>
              <div style="font-weight: 800; color: #f59e0b;">{{ e.rating_medio ? (e.rating_medio | number:'1.1-1') : '-' }}⭐</div>
            </div>
            <button (click)="scaricaCSV(e.id)" style="background: #64748b; font-size: 0.75rem; padding: 0 15px;">CSV</button>
          </div>
        </div>
      }
    </div>
  </section>
</div>
