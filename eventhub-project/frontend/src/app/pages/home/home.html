<div style="text-align: center; margin-bottom: 40px; padding-top: 20px;">
  <h1 style="font-size: 2.2rem; margin: 0; letter-spacing: -1px;">Event<span style="color:var(--primary)">Hub</span></h1>
  <p style="color: var(--text-light);">Esplora gli eventi in programma</p>
</div>

<!-- Filtri completi: Città, Categoria, Data, Prezzo -->
<div style="background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 15px; align-items: end; margin-bottom: 40px;">
  <div>
    <label style="display:block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Città</label>
    <input [(ngModel)]="filtri.citta" placeholder="Esempio: Milano">
  </div>
  <div>
    <label style="display:block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Categoria</label>
    <select [(ngModel)]="filtri.categoria">
      <option value="">Tutte le categorie</option>
      <option value="concerto">Concerto</option>
      <option value="workshop">Workshop</option>
      <option value="libro">Libro</option>
    </select>
  </div>
  <div>
    <label style="display:block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Data</label>
    <input type="date" [(ngModel)]="filtri.data">
  </div>
  <div>
    <label style="display:block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">Prezzo Max</label>
    <input type="number" [(ngModel)]="filtri.prezzo_max" placeholder="€">
  </div>
  <button (click)="carica()" style="height: 42px; padding: 0 25px;">Cerca</button>
</div>

<div class="event-grid">
  @for (e of eventi(); track e.id) {
    <div class="event-card">
      <div class="event-img-container">
        <img [src]="apiUrl + '/eventi/' + e.id + '/immagine'">
      </div>
      <div style="padding: 20px;">
        <span class="badge">{{ e.categoria }}</span>
        <h3 style="margin: 10px 0 15px 0; font-size: 1.2rem;">{{ e.titolo }}</h3>
        <div style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 5px;">📍 {{ e.luogo }}</div>
        <div style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 20px;">📅 {{ e.data_evento | date:'mediumDate' }}</div>
        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 15px;">
          <span style="font-size: 1.3rem; font-weight: 800;">{{ e.prezzo }}€</span>
          <button [routerLink]="['/dettaglio-evento', e.id]" style="padding: 8px 16px; font-size: 0.8rem;">Dettagli</button>
        </div>
      </div>
    </div>
  }
</div>
